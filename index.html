<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHAI_BIOMETRIC_INTERFACE</title>
    <style>
        :root {
            --stark-blue: #00d4ff;
            --chai-gold: #d2a679;
            --danger-red: #ff3e3e;
            --bg-dark: #08080a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--stark-blue);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* HUD OVERLAY */
        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 212, 255, 0.2);
            position: absolute;
            z-index: 10;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { from { top: 0; } to { top: 100%; } }

        #glass-container {
            position: relative;
            width: 120px;
            height: 160px;
            border: 4px solid var(--stark-blue);
            border-top: none;
            border-radius: 0 0 20px 20px;
            margin: 20px auto;
            overflow: hidden;
        }

        #tea-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: var(--chai-gold);
            transition: height 0.5s ease;
            box-shadow: 0 0 15px var(--chai-gold);
        }

        .steam {
            position: absolute;
            top: -40px; left: 50%;
            width: 2px; height: 30px;
            background: rgba(255,255,255,0.3);
            filter: blur(5px);
            animation: rise 2s infinite;
        }

        @keyframes rise { 0% { transform: translateY(0) scaleX(1); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-40px) scaleX(2); opacity: 0; } }

        .btn {
            background: none;
            border: 1px solid var(--stark-blue);
            color: var(--stark-blue);
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
        }

        .btn:hover { background: var(--stark-blue); color: black; }

        input {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="scanline"></div>

<div id="hud-box" style="text-align: center; border: 1px solid var(--stark-blue); padding: 30px; background: rgba(0,0,0,0.8);">
    <div id="setup-screen">
        <h2>BIOMETRIC_ANALYSIS</h2>
        <input type="text" id="name" placeholder="SUBJECT NAME"><br>
        <input type="number" id="weight" placeholder="WEIGHT (KG)"><br>
        <button class="btn" onclick="calculateLimit()">CALCULATE_THRESHOLD</button>
    </div>

    <div id="sim-screen" style="display:none;">
        <h2 id="status">ANALYZING...</h2>
        <p>MAX_SAFE_DOSAGE: <span id="limit-display">0</span> CUPS</p>
        
        <div id="glass-container">
            <div class="steam"></div>
            <div id="tea-level"></div>
        </div>

        <p>STOMACH_LOAD: <span id="current-cups">0</span> / <span id="max-cups">20</span></p>
        <button class="btn" onclick="pourChai()">POUR_AND_DRINK</button>
    </div>
</div>

<script>
    let limit = 0;
    let current = 0;

    function calculateLimit() {
        const weight = document.getElementById('weight').value || 70;
        // Calculation: 1 cup = ~50mg caffeine. Max safe is ~6mg per kg.
        limit = Math.floor((weight * 6) / 50);
        
        document.getElementById('limit-display').innerText = limit;
        document.getElementById('max-cups').innerText = 20; // Your hard limit
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('sim-screen').style.display = 'block';
    }

    function pourChai() {
        if (current < 20) {
            // Pour Animation
            const tea = document.getElementById('tea-level');
            tea.style.height = "80%";
            document.getElementById('status').innerText = "POURING_CARAMEL_FLUID...";
            
            setTimeout(() => {
                // Drink Animation
                tea.style.height = "0%";
                current++;
                document.getElementById('current-cups').innerText = current;
                
                if (current > limit) {
                    document.getElementById('status').innerText = "WARNING: TOXICITY_THRESHOLD_BREACHED";
                    document.getElementById('status').style.color = "var(--danger-red)";
                } else {
                    document.getElementById('status').innerText = "CONSUMPTION_SUCCESS";
                }

                if (current >= 20) {
                    crashSystem();
                }
            }, 800);
        }
    }

    function crashSystem() {
        document.getElementById('status').innerText = "CRITICAL_STOMACH_ERROR_ALLOCATING_MEMORY";
        document.body.style.animation = "shake 0.1s infinite";
        
        // Final heavy loop
        setTimeout(() => {
            const crashArray = [];
            while(true) {
                crashArray.push(new Array(1000000).fill("SYSTEM_FAILURE"));
            }
        }, 1500);
    }
</script>

</body>
</html>
