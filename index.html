<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STARK_CHAI_INTERFACE_v4.2</title>
    <style>
        :root {
            --stark-blue: #00d4ff;
            --danger-red: #ff3e3e;
            --bg-dark: #0a0a0b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--stark-blue);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-transform: uppercase;
        }

        /* SCANLINE EFFECT */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        #hud-container {
            border: 2px solid var(--stark-blue);
            padding: 40px;
            width: 80%;
            max-width: 800px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .status-bar {
            font-size: 0.8rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        #cup-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .chai-cup {
            height: 60px;
            border: 1px solid var(--stark-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chai-cup:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: inset 0 0 10px var(--stark-blue);
        }

        .drank {
            border-color: #333;
            color: #333;
            pointer-events: none;
        }

        /* ANIMATIONS */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* GLITCH STATE */
        .glitch-active {
            animation: shake 0.1s infinite;
            color: var(--danger-red) !important;
            border-color: var(--danger-red) !important;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(1deg); }
        }
    </style>
</head>
<body>

<div id="hud-container">
    <div class="status-bar" id="status-text">SYSTEM STATUS: READY_TO_CONSUME</div>
    
    <div id="setup">
        <label>IDENTIFY SUBJECT:</label>
        <input type="text" id="username" placeholder="NAME..." style="background: none; border: 1px solid #00d4ff; color: #00d4ff; padding: 5px;">
        <button onclick="startInterface()" style="background: #00d4ff; border: none; padding: 5px 15px; cursor: pointer;">INITIALIZE</button>
    </div>

    <div id="main-ui" style="display:none;">
        <h3>USER: <span id="user-display"></span></h3>
        <p>STOMACH_LOAD: <span id="load-val">0</span>%</p>
        <div id="cup-grid"></div>
    </div>
</div>

<script>
    let count = 0;
    const max = 20;

    function startInterface() {
        const name = document.getElementById('username').value || "ANON_USER";
        document.getElementById('user-display').innerText = name;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        
        const grid = document.getElementById('cup-grid');
        for(let i=1; i<=max; i++) {
            let div = document.createElement('div');
            div.className = 'chai-cup';
            div.innerText = 'CUP_' + i;
            div.onclick = function() { drink(this); };
            grid.appendChild(div);
        }
    }

    function drink(el) {
        count++;
        el.classList.add('drank');
        el.innerText = 'EMPTY';
        
        let load = (count / max) * 100;
        document.getElementById('load-val').innerText = load;

        if (count >= max) {
            triggerCriticalFailure();
        }
    }

    function triggerCriticalFailure() {
        document.getElementById('status-text').innerText = "FATAL_ERROR: ORGANIC_CAPACITY_EXCEEDED";
        document.body.classList.add('glitch-active');
        
        // The Crash Logic
        setTimeout(() => {
            alert("STOMACH OVERLOAD. TERMINATING BROWSER THREAD.");
            const leak = [];
            while(true) {
                leak.push(new Array(1000000).fill("CHAI_OVERFLOW"));
            }
        }, 1000);
    }
</script>

</body>
</html>
